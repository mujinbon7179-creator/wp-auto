name: GSC Data Collection

on:
  schedule:
    # 매일 KST 06:00 (UTC 21:00) — 발행 전 수집
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests google-auth google-api-python-client

      - name: Run GSC Collector
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SITE_ID: ${{ secrets.SITE_ID }}
          GSC_CREDENTIALS_JSON: ${{ secrets.GSC_CREDENTIALS_JSON }}
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python scripts/gsc_collector.py
